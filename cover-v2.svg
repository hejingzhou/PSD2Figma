</filter>
</defs>
<rect width="1600" height="900" fill="url(#bg)"/>
<circle cx="1420" cy="120" r="260" fill="#33C5FF" fill-opacity="0.15"/>
<circle cx="210" cy="760" r="220" fill="#7456FF" fill-opacity="0.22"/>
